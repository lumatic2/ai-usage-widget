<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Usage Widget</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="widget">
      <section class="card drag">
        <div class="two-col two-col--dual">
          <div class="col col--claude">
            <div class="title-row title-row--claude">
              <span class="title-text title-text--claude">CLAUDE</span>
              <span id="claudeStatusPill" hidden></span>
              <div class="title-row-actions no-drag" id="claudeActions" hidden>
                <button class="settings-toggle" id="settingsToggleButtonAlt" type="button" aria-label="Open settings">⚙</button>
                <button class="hide" id="hideButtonAlt" aria-label="Hide widget">×</button>
              </div>
            </div>
            <div class="stack stack--claude" id="claudeSection">
              <div class="pixel-card-wrap">
                <div class="pixel-bar pixel-bar--purple" id="claudePrimaryBar">
                  <div class="bar-left">
                    <img class="bar-icon" src="./icon-5h.svg" alt="" draggable="false" />
                    <span class="bar-label">5-HOUR</span>
                  </div>
                  <span class="bar-value" id="claudePrimaryValue">--%</span>
                  <div class="bar-progress"><span class="bar-progress-fill bar-progress-fill--purple" id="claudePrimaryProgress"></span></div>
                </div>
                <div class="reset-tag" id="claudePrimaryResetTag"><span class="reset-tag-text" id="claudePrimaryReset">reset --</span></div>
              </div>
              <div class="pixel-card-wrap">
                <div class="pixel-bar pixel-bar--teal" id="claudeSecondaryBar">
                  <div class="bar-left">
                    <img class="bar-icon" src="./icon-week.svg" alt="" draggable="false" />
                    <span class="bar-label">WEEKLY</span>
                  </div>
                  <span class="bar-value" id="claudeSecondaryValue">--%</span>
                  <div class="bar-progress"><span class="bar-progress-fill bar-progress-fill--teal" id="claudeSecondaryProgress"></span></div>
                </div>
                <div class="reset-tag" id="claudeSecondaryResetTag"><span class="reset-tag-text" id="claudeSecondaryReset">reset --</span></div>
              </div>
            </div>
            <div class="claude-login-wrap" id="claudeLoginWrap" hidden>
              <button class="claude-login-btn no-drag" id="claudeLoginBtn" type="button">LOGIN</button>
              <span class="claude-login-hint">Login to claude.ai to show usage</span>
            </div>
            <div class="error-banner error-banner--claude" id="claudeErrorBanner" hidden>
              <span class="error-label">CLAUDE</span>
              <span class="error-text" id="claudeErrorText">Claude usage unavailable.</span>
              <button class="error-close no-drag" id="claudeErrorCloseButton" type="button" aria-label="Dismiss Claude error">x</button>
            </div>
          </div>
          <div class="col col--codex">
            <div class="title-row title-row--codex">
              <span class="title-text">CODEX</span>
              <div class="title-row-actions no-drag">
                <button class="settings-toggle" id="settingsToggleButton" type="button" aria-label="Open settings">⚙</button>
                <button class="hide" id="hideButton" aria-label="Hide widget">×</button>
              </div>
            </div>
            <div class="stack">
              <div class="pixel-card-wrap">
                <div class="pixel-bar pixel-bar--gold">
                  <div class="bar-left">
                    <img class="bar-icon" src="./icon-5h.svg" alt="" draggable="false" />
                    <span class="bar-label">5-HOUR</span>
                  </div>
                  <span class="bar-value" id="primaryValue">--%</span>
                  <div class="bar-progress"><span class="bar-progress-fill bar-progress-fill--gold" id="primaryProgress"></span></div>
                </div>
                <div class="reset-tag" id="primaryResetTag"><span class="reset-tag-text" id="primaryReset">reset --</span></div>
              </div>
              <div class="pixel-card-wrap">
                <div class="pixel-bar pixel-bar--green">
                  <div class="bar-left">
                    <img class="bar-icon" src="./icon-week.svg" alt="" draggable="false" />
                    <span class="bar-label">WEEKLY</span>
                  </div>
                  <span class="bar-value" id="secondaryValue">--%</span>
                  <div class="bar-progress"><span class="bar-progress-fill bar-progress-fill--green" id="secondaryProgress"></span></div>
                </div>
                <div class="reset-tag" id="secondaryResetTag"><span class="reset-tag-text" id="secondaryReset">reset --</span></div>
              </div>
            </div>
            <div class="error-banner" id="errorBanner" hidden>
              <span class="error-label">ERROR</span>
              <span class="error-text" id="errorText">Unable to refresh usage.</span>
              <button class="error-close no-drag" id="errorCloseButton" type="button" aria-label="Dismiss error">x</button>
            </div>
          </div>
        </div>
        <section class="settings-panel no-drag" id="settingsPanel" hidden>
          <div class="settings-row">
            <label class="settings-label" for="displayModeSelect">Display</label>
            <select class="settings-input" id="displayModeSelect">
              <option value="used">USED</option>
              <option value="left">LEFT</option>
            </select>
          </div>
          <div class="settings-row">
            <label class="settings-label" for="refreshSecondsInput">Refresh(s)</label>
            <input class="settings-input" id="refreshSecondsInput" type="number" min="10" max="600" />
          </div>
          <div class="settings-row settings-row--check">
            <label class="settings-label settings-label--check" for="alertsEnabledInput">Usage alerts</label>
            <input id="alertsEnabledInput" type="checkbox" />
          </div>
          <div class="settings-row">
            <label class="settings-label" for="alertThresholdsInput">Thresholds</label>
            <input class="settings-input" id="alertThresholdsInput" type="text" placeholder="30,60,80,90" />
          </div>
          <div class="settings-row settings-row--check">
            <label class="settings-label settings-label--check" for="openOnStartupInput">Open at login</label>
            <input id="openOnStartupInput" type="checkbox" />
          </div>
          <div class="settings-row settings-row--check">
            <label class="settings-label settings-label--check" for="showClaudeInput">Show Claude</label>
            <input id="showClaudeInput" type="checkbox" />
          </div>
          <div class="settings-row settings-row--check">
            <label class="settings-label settings-label--check" for="showCodexInput">Show Codex</label>
            <input id="showCodexInput" type="checkbox" />
          </div>
          <div class="settings-actions">
            <button class="settings-btn" id="settingsSaveButton" type="button">Save</button>
            <button class="settings-btn" id="settingsRefreshButton" type="button">Refresh</button>
          </div>
          <div class="settings-actions settings-actions--secondary">
            <button class="settings-btn settings-btn--link" id="claudeLogoutButton" type="button">Claude Logout</button>
          </div>
          <div class="settings-note">Auto-start applies to packaged app.</div>
        </section>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
  </html>
